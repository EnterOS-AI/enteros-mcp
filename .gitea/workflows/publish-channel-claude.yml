name: Publish channels/claude to npm
on:
  push:
    tags: ['channel-claude-v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: channels/claude
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test
      - name: Publish @molecule-ai/mcp-claude-channel
        # Use npm for publish — npm registry is the canonical npm publish surface.
        # bun publish exists but is less battle-tested for scoped public packages.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
